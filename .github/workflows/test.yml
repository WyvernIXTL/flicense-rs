name: Test

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-24.04-arm
    name: Test Execution (Ubuntu)
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build Cache
        uses: Swatinem/rust-cache@v2
      - name: Build Debug
        run: cargo b
      - name: Run CLI
        run: ./target/debug/flicense -s .

  check-msrv:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-msrv
      - run: cargo msrv verify
